version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: drops
      POSTGRES_PASSWORD: drops_secret
      POSTGRES_DB: drops
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata: